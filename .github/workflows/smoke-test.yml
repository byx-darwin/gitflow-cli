name: Smoke Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    name: Smoke Test (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [github, gitlab, gitcode]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Add to PATH
        run: echo "${{ github.workspace }}/target/release" >> $GITHUB_PATH

      - name: Verify installation
        run: |
          gitflow-cli --version
          gitflow-cli --help

      - name: Run smoke test (read-only)
        run: bash scripts/smoke-test.sh --platform ${{ matrix.platform }} --read-only

      - name: Run smoke test (write mode help only)
        run: bash scripts/smoke-test.sh --platform ${{ matrix.platform }} --write
        if: success()
