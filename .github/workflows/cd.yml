name: CD

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ github.ref_name }}
      prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
    secrets: inherit
