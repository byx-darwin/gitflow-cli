name: Release

# GitHub Release workflow — 在 tag push (v* 格式) 时触发
# 1. 构建 release binary（macOS/Linux）
# 2. 计算 SHA256
# 3. 创建 GitHub Release 并上传 assets
# 4. 更新 Homebrew formula 中的 url + sha256

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gitflow-cli-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gitflow-cli-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gitflow-cli-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ matrix.artifact }}.tar.gz gitflow-cli
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-formula:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: release
    if: false # 手动启用：当公式合并到 homebrew-core 或自定义 tap 后再开启

    steps:
      - name: Calculate SHA256 for source tarball
        run: |
          # GitHub 自动生成的 source tarball 格式
          SOURCE_URL="https://github.com/byx-darwin/gitflow-cli/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          echo "SOURCE_URL=${SOURCE_URL}" >> $GITHUB_ENV
          curl -sL "${SOURCE_URL}" | sha256sum | cut -d' ' -f1 > source.sha256
          echo "SOURCE_SHA256=$(cat source.sha256)" >> $GITHUB_ENV

      - name: Update Homebrew formula
        run: |
          sed -i "s|url \".*\"|url \"${SOURCE_URL}\"|" HomebrewFormula/gitflow-cli.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SOURCE_SHA256}\"|" HomebrewFormula/gitflow-cli.rb
          sed -i "s|version \".*\"|version \"${{ github.ref_name }#v}\"|" HomebrewFormula/gitflow-cli.rb