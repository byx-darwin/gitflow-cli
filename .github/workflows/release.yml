name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      prerelease:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.1.0)"
        required: true
      prerelease:
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: gitflow-cli

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest' && !matrix.musl
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} || true

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }} ${{ env.BINARY_NAME }}
          cd ../../..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }} ${{ env.BINARY_NAME }}.exe
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.set-tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) | while read f; do cp "$f" release/; done

      - name: Checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: release/*
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}

      - name: Set tag output
        id: set-tag
        run: echo "tag_name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

  update-homebrew:
    name: Update Homebrew Formula
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute per-architecture SHA256
        id: sha
        run: |
          TAG="${{ needs.release.outputs.tag_name }}"
          REPO="${{ github.repository }}"

          declare -A URLS=(
            [arm64]=https://github.com/${REPO}/releases/download/${TAG}/gitflow-cli-aarch64-apple-darwin.tar.gz
            [x86_64]=https://github.com/${REPO}/releases/download/${TAG}/gitflow-cli-x86_64-apple-darwin.tar.gz
            [linux_arm64]=https://github.com/${REPO}/releases/download/${TAG}/gitflow-cli-aarch64-unknown-linux-gnu.tar.gz
            [linux_x86_64]=https://github.com/${REPO}/releases/download/${TAG}/gitflow-cli-x86_64-unknown-linux-gnu.tar.gz
          )

          for key in "${!URLS[@]}"; do
            SHA=$(curl -sL "${URLS[$key]}" | sha256sum | awk '{print $1}')
            echo "${key}=${SHA}" >> "$GITHUB_OUTPUT"
          done

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Update HomebrewFormula/gitflow-cli.rb
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          python3 << PYEOF
          import re

          FORMULA = "HomebrewFormula/gitflow-cli.rb"
          with open(FORMULA, "r") as f:
              content = f.read()

          # Replace all SHA256 placeholders with computed values
          content = content.replace("PLACEHOLDER_SHA256_ARM64", "${{ steps.sha.outputs.arm64 }}")
          content = content.replace("PLACEHOLDER_SHA256_X86_64", "${{ steps.sha.outputs.x86_64 }}")
          content = content.replace("PLACEHOLDER_SHA256_LINUX_ARM64", "${{ steps.sha.outputs.linux_arm64 }}")
          content = content.replace("PLACEHOLDER_SHA256_LINUX_X86_64", "${{ steps.sha.outputs.linux_x86_64 }}")

          # Update version in on_macos / on_linux url paths
          content = re.sub(
              r'(releases/download/)v[\d.]+/',
              r'\1' + "$TAG" + '/',
              content,
          )

          with open(FORMULA, "w") as f:
              f.write(content)
          print(f"Updated {FORMULA} to $TAG")
          PYEOF

      - name: Commit and push formula update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HomebrewFormula/gitflow-cli.rb
          git diff --cached --quiet || git commit -m "chore: update Homebrew formula to ${{ steps.sha.outputs.tag }}"
          git push origin main

  publish-crates-io:
    name: Publish to crates.io
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Verify package
        run: |
          cargo package --list
          cargo package --no-verify

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN not set, skipping crates.io publish"
            echo "::warning::To enable crates.io publishing, add CARGO_REGISTRY_TOKEN to repository secrets"
            exit 0
          fi

          echo "Publishing to crates.io..."
          # Publish in dependency order
          cargo publish --token "$CARGO_REGISTRY_TOKEN" -p gitflow-cli-core || true
          cargo publish --token "$CARGO_REGISTRY_TOKEN" -p gitflow-cli-github || true
          cargo publish --token "$CARGO_REGISTRY_TOKEN" -p gitflow-cli-gitlab || true
          cargo publish --token "$CARGO_REGISTRY_TOKEN" -p gitflow-cli-gitcode || true
          cargo publish --token "$CARGO_REGISTRY_TOKEN" -p gitflow-cli || true
          echo "✓ Published to crates.io"
