name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      prerelease:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.1.0)"
        required: true
      prerelease:
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: gitflow-cli

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest' && !matrix.musl
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} || true

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }} ${{ env.BINARY_NAME }}
          cd ../../..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }} ${{ env.BINARY_NAME }}.exe
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.set-tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) | while read f; do cp "$f" release/; done

      - name: Checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: release/*
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}

      - name: Set tag output
        id: set-tag
        run: echo "tag_name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"

  update-homebrew:
    name: Update Homebrew Formula
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false

      - name: Compute per-architecture SHA256
        id: sha
        run: |
          TAG="${{ needs.release.outputs.tag_name }}"
          REPO="${{ github.repository }}"

          declare -A URLS=(
            [arm64]=https://github.com/${REPO}/releases/download/${TAG}/gitflow-cli-aarch64-apple-darwin.tar.gz
            [x86_64]=https://github.com/${REPO}/releases/download/${TAG}/gitflow-cli-x86_64-apple-darwin.tar.gz
            [linux_arm64]=https://github.com/${REPO}/releases/download/${TAG}/gitflow-cli-aarch64-unknown-linux-gnu.tar.gz
            [linux_x86_64]=https://github.com/${REPO}/releases/download/${TAG}/gitflow-cli-x86_64-unknown-linux-gnu.tar.gz
          )

          for key in "${!URLS[@]}"; do
            SHA=$(curl -sL "${URLS[$key]}" | sha256sum | awk '{print $1}')
            echo "${key}=${SHA}" >> "$GITHUB_OUTPUT"
          done

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Update HomebrewFormula/gitflow-cli.rb
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          FORMULA="HomebrewFormula/gitflow-cli.rb"

          # Update macos arm64
          sed -i "/on_macos do/,/Hardware::CPU.arm?/{ /arm/,+2s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.arm64 }}\"| }" "$FORMULA"
          sed -i "/on_macos do/,/Hardware::CPU.arm?/{ /arm/,+2s|url \".*\"|url \"https://github.com/${{ github.repository }}/releases/download/${TAG}/gitflow-cli-aarch64-apple-darwin.tar.gz\"| }" "$FORMULA"

          # Update macos x86_64
          sed -i "/on_macos do/,/end/{ /else/,+2s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.x86_64 }}\"| }" "$FORMULA"
          sed -i "/on_macos do/,/end/{ /else/,+2s|url \".*\"|url \"https://github.com/${{ github.repository }}/releases/download/${TAG}/gitflow-cli-x86_64-apple-darwin.tar.gz\"| }" "$FORMULA"

          # Update linux arm64
          sed -i "/on_linux do/,/Hardware::CPU.arm?/{ /arm/,+2s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.linux_arm64 }}\"| }" "$FORMULA"
          sed -i "/on_linux do/,/Hardware::CPU.arm?/{ /arm/,+2s|url \".*\"|url \"https://github.com/${{ github.repository }}/releases/download/${TAG}/gitflow-cli-aarch64-unknown-linux-gnu.tar.gz\"| }" "$FORMULA"

          # Update linux x86_64
          sed -i "/on_linux do/,/end/{ /else/,+2s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.linux_x86_64 }}\"| }" "$FORMULA"
          sed -i "/on_linux do/,/end/{ /else/,+2s|url \".*\"|url \"https://github.com/${{ github.repository }}/releases/download/${TAG}/gitflow-cli-x86_64-unknown-linux-gnu.tar.gz\"| }" "$FORMULA"

      - name: Commit and push formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add HomebrewFormula/gitflow-cli.rb
          git diff --cached --quiet || git commit -m "chore: update Homebrew formula to ${{ steps.sha.outputs.tag }}"
          git push origin main
